<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up • ShopNest</title>
  <link rel="stylesheet" href="./css/auth.css" />
</head>
<body>
  <main class="auth">
    <section class="auth__card">
      <h1 class="auth__title">Create account</h1>

      <form id="signupForm" class="form">
        <div class="field">
          <label for="firstName">First name</label>
          <input class="input" type="text" id="firstName" placeholder="First name" required />
        </div>

        <div class="field">
          <label for="lastName">Last name</label>
          <input class="input" type="text" id="lastName" placeholder="Last name" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input class="input" type="email" id="email" placeholder="Enter email" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input class="input" type="password" id="password" placeholder="Enter password" required />
        </div>

        <div class="field">
          <label for="repeatPassword">Repeat password</label>
          <input class="input" type="password" id="repeatPassword" placeholder="Repeat password" required />
        </div>

        <label class="checkbox">
          <input type="checkbox" id="terms" required />
          I agree to the Terms and Conditions
        </label>

        <button class="btn btn--primary" type="submit">Create account</button>

        <p class="helper">
          Already have an account? <a href="login.html">Login</a>
        </p>
        <p class="helper">
          <a href="index.html">← Back to shop</a>
        </p>
      </form>
    </section>
  </main>

  <script src="./js/signup.js" type="module"></script>
</body>
</html>
