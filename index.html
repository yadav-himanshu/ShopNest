<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopNest • Premium E-commerce</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='url(%23g)'/><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%23a855f7'/><stop offset='100%' stop-color='%236366f1'/></linearGradient></defs><text x='50' y='70' fill='white' font-family='Inter, sans-serif' font-weight='800' font-size='65' text-anchor='middle'>S</text></svg>">

  <!-- Theme Init Script - Prevent Flash -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      }
    })();
  </script>
</head>

<body>
  <!-- Navbar Container -->
  <div id="navbar-root"></div>

  <!-- Main Content Rendering Area for SPA Router -->
  <main id="app-root"></main>

  <!-- Footer Container -->
  <div id="footer-root"></div>

  <!-- Toast Notifications Container -->
  <div id="toast-root"></div>

  <!-- Cart Drawer Container -->
  <div id="cart-drawer-root"></div>

  <!-- Entry script -->
  <script type="module" src="./src/main.js"></script>
</body>

</html>
