<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart • ShopNest</title>
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/cart.css" />
</head>
<body>
  <nav class="nav">
    <div class="nav__container">
      <a class="brand" href="index.html" aria-label="ShopNest Home">
        <img src="./assets/logo.png" alt="ShopNest Logo" class="brand__logo" />
        <span class="brand__name">ShopNest</span>
      </a>

      <button class="menuBtn" id="menu-toggle" type="button" aria-label="Toggle menu">☰</button>

      <div class="menu" id="nav-menu" data-open="false">
        <div class="nav__links">
          <a class="btn btn--ghost" href="index.html">Shop</a>
          <a class="btn btn--ghost" href="cart.html">Cart <span class="pill" id="nav-cart-count">0</span></a>
          <a class="btn btn--ghost" href="checkout.html">Checkout</a>
        </div>

        <div class="nav__right">
          <div class="nav__guest" id="guest-actions">
            <a class="btn btn--ghost" href="signup.html">Sign Up</a>
            <a class="btn btn--primary" href="login.html">Sign In</a>
          </div>

          <div class="nav__user" id="user-actions" hidden>
            <span class="nav__welcome" id="user-name">Hi</span>
            <button class="btn btn--ghost" id="logout-button" type="button">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <header class="page">
    <div class="page__container">
      <h1 class="page__title">Your Cart</h1>
      <p class="page__subtitle">Review your items and proceed to checkout.</p>
    </div>
  </header>

  <main class="page__container">
    <section class="cart">
      <div class="cart__left">
        <div id="cart-items" class="cart__items"></div>
      </div>

      <aside class="cart__right">
        <div class="summary">
          <h2 class="summary__title">Order Summary</h2>
          <div class="summary__row">
            <span>Items</span>
            <span id="summary-items">0</span>
          </div>
          <div class="summary__row">
            <span>Subtotal</span>
            <span id="summary-subtotal">$0.00</span>
          </div>
          <div class="summary__row summary__row--total">
            <span>Total</span>
            <span id="summary-total">$0.00</span>
          </div>

          <button id="clear-cart" class="btn btn--ghost" type="button">Clear Cart</button>
          <a class="btn btn--primary" href="checkout.html">Go to Checkout</a>
        </div>
      </aside>
    </section>
  </main>

  <footer class="footer">
    <div class="page__container">
      <div class="footer__bottom">
        <span>© 2025 ShopNest. All rights reserved.</span>
        <span>Demo project • Checkout is simulated</span>
      </div>
    </div>
  </footer>

  <script src="./js/cart.js" type="module"></script>
</body>
</html>
